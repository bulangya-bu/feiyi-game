<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修复台 · 飞檐拾光</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/game.css}">
</head>
<body class="page-shell page-game" th:attr="data-level-id=${levelId}">

<!-- 上卷轴端木 -->
<div class="scroll-bar scroll-bar--top"></div>

<div class="scroll-body">

    <header class="site-header">
        <a class="site-brand" th:href="@{/}">
            <span class="site-brand__mark">飞檐拾光</span>
            <span class="site-brand__sub">非遗文化拼图</span>
        </a>
        <nav class="site-nav">
            <a th:href="@{/levels}">返回图录</a>
        </nav>
    </header>

    <main class="scroll-content game-main">

        <!-- ── 题签区 ── -->
        <section class="game-label" data-reveal="soft">
            <div class="game-label__info">
                <span class="title-label">修复台</span>
                <h1 id="level-title" class="game-label__title">载入中...</h1>
                <p id="level-subtitle" class="game-label__subtitle">正在展开作品。</p>
            </div>
            <div class="game-label__stats">
                <div class="game-stat">
                    <span class="game-stat__label">难度</span>
                    <span class="game-stat__value" id="level-difficulty">--</span>
                </div>
                <div class="game-stat">
                    <span class="game-stat__label">规格</span>
                    <span class="game-stat__value" id="level-grid">--</span>
                </div>
                <div class="game-stat game-stat--timer">
                    <span class="game-stat__label">倒计时</span>
                    <span class="game-stat__value" id="timer-display">--:--</span>
                </div>
            </div>
        </section>

        <hr class="ink-divider">

        <!-- ── 修复台主区域 ── -->
        <section class="restoration-desk" data-reveal="soft" style="--reveal-delay:100ms;">

            <!-- 画心区域（拼图） -->
            <div class="desk-workspace">
                <div id="board-shell" class="board-shell">
                    <div id="puzzle-board" class="puzzle-board" aria-label="拼图区域"></div>
                    <div id="reference-overlay" class="reference-overlay" hidden>
                        <button id="close-preview" class="reference-overlay__close" type="button">关闭原图</button>
                        <img id="reference-image" src="" alt="当前关卡原图预览">
                    </div>
                </div>

                <!-- 工具条（画心下方） -->
                <div class="desk-controls">
                    <div class="desk-controls__left">
                        <button id="restart-button" class="button button--ghost" type="button">重新开始</button>
                        <button id="preview-button" class="button button--ghost" type="button">查看原图</button>
                        <a class="button button--ghost" th:href="@{/levels}">切换关卡</a>
                    </div>
                    <div class="desk-controls__right">
                        <span>已归位 <strong id="progress-count">0 / 0</strong></span>
                        <span>操作 <strong id="move-count">0</strong></span>
                    </div>
                </div>
                <p class="desk-hint" id="selection-hint">选择任意两块交换，或直接拖拽。</p>
            </div>

            <!-- 旁注栏 -->
            <aside class="desk-notes">
                <div class="desk-notes__image">
                    <img id="inspector-image" src="" alt="当前作品预览">
                </div>
                <div class="desk-notes__content">
                    <p class="desk-notes__location eyebrow" id="level-location">--</p>
                    <p class="desk-notes__desc" id="level-description">正在读取作品信息。</p>

                    <dl class="desk-notes__facts">
                        <div>
                            <dt>建筑特色</dt>
                            <dd id="level-features">--</dd>
                        </div>
                        <div>
                            <dt>文化意义</dt>
                            <dd id="level-culture">--</dd>
                        </div>
                        <div>
                            <dt>冷知识</dt>
                            <dd id="level-fact">--</dd>
                        </div>
                    </dl>
                </div>
            </aside>

        </section>

    </main>
</div>

<!-- 下卷轴端木 -->
<div class="scroll-bar scroll-bar--bottom"></div>

<!-- ── 通关弹窗 ── -->
<div id="result-modal" class="modal" hidden>
    <div class="modal__backdrop"></div>
    <div class="modal__panel">
        <p class="eyebrow" id="modal-kicker">修复完成</p>
        <h2 id="modal-title">作品标题</h2>
        <p id="modal-summary">作品简介</p>
        <div class="modal__metrics">
            <p>评级 <strong id="modal-stars">★★★</strong></p>
            <p>剩余 <strong id="modal-time-left">00:00</strong></p>
            <p>用时 <strong id="modal-elapsed">0 秒</strong></p>
        </div>
        <div class="modal__body">
            <p><strong>建筑特色：</strong><span id="modal-features"></span></p>
            <p><strong>文化意义：</strong><span id="modal-culture"></span></p>
            <p><strong>冷知识：</strong><span id="modal-fact"></span></p>
        </div>
        <div class="modal__actions">
            <button id="retry-button" class="button button--ghost" type="button">再试一次</button>
            <button id="next-button" class="button button--primary" type="button">下一卷</button>
            <a class="button button--ghost" th:href="@{/levels}">返回图录</a>
        </div>
    </div>
</div>

<!-- ── 失败弹窗 ── -->
<div id="fail-modal" class="modal" hidden>
    <div class="modal__backdrop"></div>
    <div class="modal__panel modal__panel--compact">
        <p class="eyebrow">时间到了</p>
        <h2>这件作品还差一点就修复完成。</h2>
        <p>可以立即重试，或者回到图录换一件作品。</p>
        <div class="modal__actions">
            <button id="retry-fail-button" class="button button--primary" type="button">立即重试</button>
            <a class="button button--ghost" th:href="@{/levels}">返回图录</a>
        </div>
    </div>
</div>

<script th:src="@{/js/page-effects.js}"></script>
<script th:src="@{/js/progress.js}"></script>
<script th:src="@{/js/game-page.js}"></script>
</body>
</html>
