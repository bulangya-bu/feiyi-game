<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图录 · 飞檐拾光</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/levels.css}">
</head>
<body class="page-shell page-levels">

<!-- 上卷轴端木 -->
<div class="scroll-bar scroll-bar--top"></div>

<div class="scroll-body">

    <header class="site-header">
        <a class="site-brand" th:href="@{/}">
            <span class="site-brand__mark">飞檐拾光</span>
            <span class="site-brand__sub">非遗文化拼图</span>
        </a>
        <nav class="site-nav">
            <a th:href="@{/}">卷首</a>
            <a th:href="@{/levels}" class="active">图录</a>
        </nav>
    </header>

    <main class="scroll-content catalog-main">

        <!-- ── 图录卷头 ── -->
        <section class="catalog-header" data-reveal="soft">
            <div class="catalog-header__label">
                <span class="title-label">图录 · 壹</span>
            </div>
            <h1 class="catalog-header__title">建筑卷</h1>
            <p class="catalog-header__lead">
                从戏楼到土楼，六座建筑已入卷。选择一件作品，在修复台上拼回原貌。
            </p>

            <!-- 章节签条切换 -->
            <div class="catalog-tabs" id="chapter-tabs">
                <button class="catalog-tab catalog-tab--active" data-chapter="building" type="button">建筑</button>
                <button class="catalog-tab" data-chapter="painting" type="button">画作</button>
                <button class="catalog-tab" data-chapter="craft" type="button">手工</button>
            </div>
        </section>

        <hr class="ink-divider">

        <!-- ── 进度小注 ── -->
        <div class="catalog-progress" data-reveal="soft">
            <span>已览 <strong id="progress-clear">0</strong> / <span id="progress-total">0</span></span>
            <span class="catalog-progress__dot">·</span>
            <span>累计 <strong id="progress-stars">0</strong> ★</span>
            <span class="catalog-progress__dot">·</span>
            <span>最快 <strong id="progress-best">--</strong></span>
        </div>

        <!-- ── 图录条目列表 ── -->
        <section class="catalog-list">
            <div id="level-list" aria-live="polite"></div>
        </section>

    </main>
</div>

<!-- 下卷轴端木 -->
<div class="scroll-bar scroll-bar--bottom"></div>

<script th:src="@{/js/page-effects.js}"></script>
<script th:src="@{/js/progress.js}"></script>
<script th:src="@{/js/levels-page.js}"></script>
</body>
</html>
